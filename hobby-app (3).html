<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hobby — Shop</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --primary:#4F3DF5;
    --primary-dark:#372ACB;
    --primary-light:#ECEAFF;
    --accent:#FF5C7A;
    --accent2:#FFB648;
    --bg:#F5F5FA;
    --surface:#FFFFFF;
    --text:#17162B;
    --text-muted:#6E6C85;
    --success:#21B573;
    --border:#E7E6F0;
    --radius:16px;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{background:#DAD9E8; font-family:'Inter',sans-serif; color:var(--text); display:flex; justify-content:center; align-items:flex-start; min-height:100vh; padding:24px 12px;}
  h1,h2,h3,.display{font-family:'Space Grotesk',sans-serif;}

  /* ---- Phone frame ---- */
  .phone{
    width:390px; max-width:100%; height:844px; max-height:96vh;
    background:var(--bg); border-radius:44px; overflow:hidden; position:relative;
    box-shadow:0 30px 60px -20px rgba(30,20,80,.45), 0 0 0 10px #111022, 0 0 0 12px #2c2a4a;
    display:flex; flex-direction:column;
  }
  .statusbar{
    height:46px; flex:0 0 auto; display:flex; align-items:center; justify-content:space-between;
    padding:0 26px; font-size:13px; font-weight:600; color:var(--text); background:var(--bg);
  }
  .notch{position:absolute; top:0; left:50%; transform:translateX(-50%); width:120px; height:26px; background:#111022; border-radius:0 0 18px 18px; z-index:50;}

  .screen{flex:1 1 auto; overflow-y:auto; overflow-x:hidden; position:relative; scrollbar-width:none;}
  .screen::-webkit-scrollbar{display:none;}

  /* ---- Topbar ---- */
  .topbar{display:flex; align-items:center; gap:12px; padding:6px 20px 14px; background:var(--bg); position:sticky; top:0; z-index:20;}
  .topbar h1{font-size:22px; font-weight:700;}
  .iconbtn{width:38px; height:38px; border-radius:12px; background:var(--surface); border:1px solid var(--border); display:flex; align-items:center; justify-content:center; cursor:pointer; flex:0 0 auto; transition:transform .15s;}
  .iconbtn:active{transform:scale(.9);}
  .iconbtn svg{width:18px; height:18px;}
  .grow{flex:1;}

  /* ---- Bottom nav ---- */
  .bottomnav{
    flex:0 0 auto; display:flex; justify-content:space-around; align-items:center;
    padding:10px 14px calc(14px + env(safe-area-inset-bottom,0px));
    background:var(--surface); border-top:1px solid var(--border); position:relative; z-index:30;
  }
  .navitem{display:flex; flex-direction:column; align-items:center; gap:4px; cursor:pointer; color:var(--text-muted); font-size:10.5px; font-weight:600; padding:6px 10px; border-radius:14px; transition:all .2s; position:relative;}
  .navitem svg{width:22px; height:22px; transition:all .2s;}
  .navitem.active{color:var(--primary); background:var(--primary-light);}
  .navitem .badge{position:absolute; top:0px; right:6px; background:var(--accent); color:#fff; font-size:9px; font-weight:700; min-width:15px; height:15px; border-radius:8px; display:flex; align-items:center; justify-content:center; padding:0 3px;}

  /* ---- Buttons ---- */
  .btn{border:none; border-radius:14px; font-family:'Inter',sans-serif; font-weight:700; font-size:14.5px; cursor:pointer; transition:transform .12s, opacity .12s;}
  .btn:active{transform:scale(.97);}
  .btn-primary{background:var(--primary); color:#fff; padding:15px; width:100%;}
  .btn-primary:disabled{opacity:.5;}
  .btn-outline{background:var(--surface); color:var(--primary); border:1.5px solid var(--primary); padding:13px; width:100%;}
  .btn-dark{background:var(--text); color:#fff; padding:15px; width:100%;}
  .btn-ghost{background:transparent; color:var(--text-muted); font-weight:600; padding:10px;}

  /* ---- Banner ---- */
  .banner-wrap{padding:4px 20px 8px;}
  .banner{
    border-radius:20px; padding:22px; min-height:130px; display:flex; flex-direction:column; justify-content:center;
    background:linear-gradient(135deg,var(--primary) 0%, #7B5CFF 100%); color:#fff; position:relative; overflow:hidden;
  }
  .banner .tag{font-size:11px; font-weight:700; letter-spacing:.08em; text-transform:uppercase; opacity:.85;}
  .banner h2{font-size:24px; line-height:1.15; margin:6px 0 10px; max-width:70%;}
  .banner .blob{position:absolute; right:-20px; top:-20px; width:120px; height:120px; background:rgba(255,255,255,.14); border-radius:50%;}
  .banner .blob2{position:absolute; right:30px; bottom:-40px; width:90px; height:90px; background:rgba(255,255,255,.12); border-radius:50%;}
  .banner .cta{align-self:flex-start; background:#fff; color:var(--primary); font-weight:700; font-size:12.5px; padding:9px 16px; border-radius:10px; z-index:2;}

  /* ---- Section header ---- */
  .section{padding:18px 20px 4px;}
  .section-head{display:flex; align-items:center; justify-content:space-between; margin-bottom:12px;}
  .section-head h3{font-size:16.5px; font-weight:700;}
  .section-head .link{font-size:12.5px; font-weight:700; color:var(--primary); cursor:pointer;}

  /* ---- Categories row ---- */
  .cat-row{display:flex; gap:14px; overflow-x:auto; padding:2px 20px 6px; scrollbar-width:none;}
  .cat-row::-webkit-scrollbar{display:none;}
  .cat-chip{flex:0 0 auto; display:flex; flex-direction:column; align-items:center; gap:7px; cursor:pointer; width:64px;}
  .cat-chip .ring{width:58px; height:58px; border-radius:50%; background:var(--surface); display:flex; align-items:center; justify-content:center; font-size:24px; box-shadow:0 2px 0 var(--border); border:2px solid transparent; transition:border-color .2s;}
  .cat-chip:hover .ring{border-color:var(--primary);}
  .cat-chip span{font-size:11px; font-weight:600; text-align:center; color:var(--text-muted);}

  /* ---- Product grid ---- */
  .grid{display:grid; grid-template-columns:1fr 1fr; gap:14px; padding:6px 20px 20px;}
  .card{background:var(--surface); border-radius:var(--radius); overflow:hidden; cursor:pointer; border:1px solid var(--border); position:relative; transition:transform .15s;}
  .card:active{transform:scale(.97);}
  .card .imgwrap{position:relative; width:100%; aspect-ratio:1/1; background:#eee; overflow:hidden;}
  .card img{width:100%; height:100%; object-fit:cover; display:block;}
  .sticker{position:absolute; top:8px; left:-6px; background:var(--accent); color:#fff; font-size:10px; font-weight:700; padding:3px 10px; transform:rotate(-8deg); border-radius:3px; box-shadow:1px 2px 3px rgba(0,0,0,.15); z-index:2;}
  .sticker.new{background:var(--success);}
  .wishbtn{position:absolute; top:8px; right:8px; width:30px; height:30px; border-radius:50%; background:rgba(255,255,255,.9); display:flex; align-items:center; justify-content:center; z-index:2; cursor:pointer;}
  .wishbtn svg{width:15px; height:15px;}
  .card .info{padding:10px 12px 12px;}
  .card .cat{font-size:10px; color:var(--text-muted); font-weight:600; text-transform:uppercase; letter-spacing:.04em;}
  .card .name{font-size:13.5px; font-weight:700; margin:3px 0 5px; line-height:1.25; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; min-height:34px;}
  .price-row{display:flex; align-items:baseline; gap:6px;}
  .price{font-weight:800; font-size:14.5px;}
  .mrp{font-size:11px; color:var(--text-muted); text-decoration:line-through;}
  .rating{display:flex; align-items:center; gap:3px; font-size:11px; color:var(--text-muted); margin-top:3px;}
  .rating svg{width:11px; height:11px; fill:var(--accent2);}

  /* ---- Search ---- */
  .searchbar{display:flex; align-items:center; gap:10px; background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:11px 14px; margin:6px 20px 4px;}
  .searchbar input{border:none; outline:none; flex:1; font-family:'Inter'; font-size:14px; background:transparent; color:var(--text);}
  .searchbar svg{width:17px; height:17px; color:var(--text-muted); flex:0 0 auto;}

  /* ---- Product Detail ---- */
  .pd-imgwrap{width:100%; aspect-ratio:1/1; background:#eee; position:relative;}
  .pd-imgwrap img{width:100%; height:100%; object-fit:cover;}
  .pd-body{padding:20px; padding-bottom:110px;}
  .pd-cat{font-size:11px; font-weight:700; color:var(--primary); text-transform:uppercase; letter-spacing:.06em;}
  .pd-title{font-size:21px; font-weight:700; margin:6px 0 8px; line-height:1.25;}
  .pd-price-row{display:flex; align-items:baseline; gap:10px; margin-bottom:14px;}
  .pd-price{font-size:24px; font-weight:800;}
  .pd-off{background:#FFE7EA; color:var(--accent); font-size:11.5px; font-weight:700; padding:3px 8px; border-radius:6px;}
  .optlabel{font-size:12.5px; font-weight:700; color:var(--text-muted); margin:16px 0 8px; text-transform:uppercase; letter-spacing:.04em;}
  .opt-row{display:flex; gap:10px; flex-wrap:wrap;}
  .opt{padding:9px 16px; border-radius:10px; border:1.5px solid var(--border); font-size:13px; font-weight:600; cursor:pointer; background:var(--surface);}
  .opt.sel{border-color:var(--primary); background:var(--primary-light); color:var(--primary);}
  .swatch{width:32px; height:32px; border-radius:50%; cursor:pointer; border:2px solid var(--border); position:relative;}
  .swatch.sel::after{content:""; position:absolute; inset:-4px; border:2px solid var(--primary); border-radius:50%;}
  .qty-row{display:flex; align-items:center; gap:16px; margin-top:16px;}
  .qty-ctrl{display:flex; align-items:center; gap:0; border:1.5px solid var(--border); border-radius:12px; overflow:hidden;}
  .qty-ctrl button{width:36px; height:36px; border:none; background:var(--surface); font-size:17px; font-weight:700; cursor:pointer; color:var(--primary);}
  .qty-ctrl .qn{width:36px; text-align:center; font-weight:700;}
  .desc{font-size:13.5px; line-height:1.6; color:var(--text-muted); margin-top:16px;}
  .pd-fixedbar{position:absolute; bottom:0; left:0; right:0; background:var(--surface); border-top:1px solid var(--border); padding:14px 20px calc(14px + env(safe-area-inset-bottom,0px)); display:flex; gap:10px; z-index:15;}

  /* ---- Cart ---- */
  .cart-item{display:flex; gap:12px; padding:14px 20px; border-bottom:1px solid var(--border);}
  .cart-item img{width:74px; height:74px; border-radius:12px; object-fit:cover; background:#eee; flex:0 0 auto;}
  .ci-info{flex:1; min-width:0;}
  .ci-info .name{font-size:13.5px; font-weight:700; margin-bottom:2px; display:-webkit-box; -webkit-line-clamp:1; -webkit-box-orient:vertical; overflow:hidden;}
  .ci-info .meta{font-size:11.5px; color:var(--text-muted); margin-bottom:6px;}
  .ci-bottom{display:flex; align-items:center; justify-content:space-between;}
  .ci-price{font-weight:800; font-size:14px;}
  .remove{color:var(--accent); font-size:11.5px; font-weight:700; cursor:pointer;}
  .summary{padding:16px 20px; background:var(--surface); margin:12px 20px; border-radius:16px; border:1px solid var(--border);}
  .srow{display:flex; justify-content:space-between; font-size:13.5px; color:var(--text-muted); margin-bottom:10px;}
  .srow.total{color:var(--text); font-weight:800; font-size:16px; padding-top:10px; border-top:1px dashed var(--border); margin-top:2px;}
  .checkout-bar{position:absolute; bottom:0; left:0; right:0; background:var(--surface); border-top:1px solid var(--border); padding:14px 20px calc(14px + env(safe-area-inset-bottom,0px)); z-index:15;}

  /* ---- Forms ---- */
  .field{margin-bottom:14px;}
  .field label{font-size:12.5px; font-weight:700; color:var(--text-muted); display:block; margin-bottom:6px;}
  .field input, .field textarea, .field select{
    width:100%; border:1.5px solid var(--border); border-radius:12px; padding:13px 14px; font-family:'Inter'; font-size:14px; outline:none; background:var(--surface); color:var(--text);
  }
  .field input:focus, .field textarea:focus{border-color:var(--primary);}
  .field-row{display:flex; gap:10px;}
  .field-row .field{flex:1;}

  /* ---- Empty state ---- */
  .empty{display:flex; flex-direction:column; align-items:center; text-align:center; padding:60px 30px; color:var(--text-muted);}
  .empty .emoji{font-size:52px; margin-bottom:14px;}
  .empty h3{color:var(--text); margin-bottom:6px; font-size:17px;}
  .empty p{font-size:13px; line-height:1.5; margin-bottom:20px;}

  /* ---- Profile ---- */
  .profile-head{display:flex; align-items:center; gap:14px; padding:20px; background:linear-gradient(135deg,var(--primary),#7B5CFF); color:#fff; margin:0 0 8px;}
  .avatar{width:58px; height:58px; border-radius:50%; background:rgba(255,255,255,.25); display:flex; align-items:center; justify-content:center; font-weight:700; font-size:22px; flex:0 0 auto;}
  .menu-row{display:flex; align-items:center; gap:14px; padding:15px 20px; border-bottom:1px solid var(--border); cursor:pointer;}
  .menu-row svg{width:19px; height:19px; color:var(--primary); flex:0 0 auto;}
  .menu-row span{flex:1; font-size:14px; font-weight:600;}
  .menu-row .chev{width:15px; height:15px; color:var(--text-muted);}

  /* ---- Toast ---- */
  .toast{position:absolute; bottom:96px; left:50%; transform:translateX(-50%) translateY(20px); background:var(--text); color:#fff; padding:12px 22px; border-radius:12px; font-size:13px; font-weight:600; z-index:100; opacity:0; transition:all .25s; pointer-events:none; white-space:nowrap;}
  .toast.show{opacity:1; transform:translateX(-50%) translateY(0);}

  /* ---- misc ---- */
  .order-card{background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:14px; margin:0 20px 14px;}
  .order-card .top{display:flex; justify-content:space-between; margin-bottom:8px;}
  .status-pill{font-size:10.5px; font-weight:700; padding:4px 10px; border-radius:8px; background:#E6F8EF; color:var(--success);}
  .starbar{display:flex; gap:2px;}
  .starbar svg{width:13px; height:13px; fill:var(--accent2);}
  .divider{height:8px; background:var(--bg);}
  .center-logo{display:flex; flex-direction:column; align-items:center; justify-content:center; height:100%; gap:10px;}
  .center-logo .logo-mark{width:74px; height:74px; border-radius:22px; background:linear-gradient(135deg,var(--primary),#7B5CFF); display:flex; align-items:center; justify-content:center; font-family:'Space Grotesk'; font-weight:700; color:#fff; font-size:34px;}
  .hint{font-size:11.5px; color:var(--text-muted); text-align:center; margin-top:14px; line-height:1.5;}
  a.linklike{color:var(--primary); font-weight:700; cursor:pointer;}
</style>
</head>

const BANNERS = [
  {tag:'New Season', title:'Made for whatever you\'re into', cta:'Explore now'},

/* ============================ STATE ============================ */
let state = {
  screen:'home',
  history:[],
  cart:[],        // {productId, qty, size, color}
  wishlist:[],    // productId
  user:null,      // {name, email}
  orders:[],
  currentProductId:null,
  pdSelected:{size:null, color:null, qty:1},
  searchQuery:'',
  categoryFilter:null,
  authMode:'login',
};

function go(screen, push=true){
  if(push) state.history.push(state.screen);
  state.screen = screen;
  render();
  document.getElementById('screen').scrollTop = 0;
}
function back(){
  const prev = state.history.pop();
  state.screen = prev || 'home';
  render();
}
function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(window._toastTimer);
  window._toastTimer = setTimeout(()=>t.classList.remove('show'), 1800);
}

/* ============================ HELPERS ============================ */
function getProduct(id){ return PRODUCTS.find(p=>p.id===id); }
function money(n){ return '₹' + n.toLocaleString('en-IN'); }
function cartCount(){ return state.cart.reduce((s,i)=>s+i.qty,0); }
function isWished(id){ return state.wishlist.includes(id); }
function toggleWish(id, ev){
  if(ev) ev.stopPropagation();
  const idx = state.wishlist.indexOf(id);
  if(idx>-1){ state.wishlist.splice(idx,1); toast('Removed from wishlist'); }
  else { state.wishlist.push(id); toast('Added to wishlist'); }
  syncUserData();
  render();
}
function addToCart(product, size, color, qty){
  const existing = state.cart.find(i=>i.productId===product.id && i.size===size && i.color===color);
  if(existing){ existing.qty += qty; }
  else{ state.cart.push({productId:product.id, qty, size, color}); }
  toast('Added to cart');
  syncUserData();
  render();
}

/* ---- Firestore persistence for logged-in users (cart / wishlist / orders) ---- */
function syncUserData(){
  if(!firebaseReady || !state.user || !state.user.uid) return; // guests aren't persisted
  db.collection('users').doc(state.user.uid).set({
    name: state.user.name,
    email: state.user.email,
    cart: state.cart,
    wishlist: state.wishlist,
    orders: state.orders,
  }, {merge:true}).catch(err=>console.warn('Sync failed:', err));
}
function cartSubtotal(){
  return state.cart.reduce((sum,item)=>{
    const p = getProduct(item.productId);
    return sum + p.price * item.qty;
  },0);
}
function starSvg(){
  return `<svg viewBox="0 0 20 20"><path d="M10 1l2.6 6.2 6.7.5-5.1 4.4 1.6 6.5L10 15l-5.8 3.6 1.6-6.5L.7 7.7l6.7-.5L10 1z"/></svg>`;
}

/* ============================ RENDER: NAV ============================ */
function renderBottomNav(){
  const tabs = [
    {id:'home', label:'Home', icon:'home'},
    {id:'categories', label:'Categories', icon:'grid'},
    {id:'wishlist', label:'Wishlist', icon:'heart'},
    {id:'cart', label:'Cart', icon:'bag'},
    {id:'profile', label:'Profile', icon:'user'},
  ];
  const hideOn = ['productDetail','checkout','orderSuccess','login','signup'];
  if(hideOn.includes(state.screen)){ document.getElementById('bottomnav').innerHTML=''; return; }
  document.getElementById('bottomnav').innerHTML = tabs.map(t=>{
    const active = state.screen===t.id;
    const badge = t.id==='cart' && cartCount()>0 ? `<span class="badge">${cartCount()}</span>` : '';
    const badge2 = t.id==='wishlist' && state.wishlist.length>0 ? `<span class="badge">${state.wishlist.length}</span>` : '';
    return `<div class="navitem ${active?'active':''}" onclick="go('${t.id}', false)">
      ${icon(t.icon)}${badge}${badge2}
      <span>${t.label}</span>
    </div>`;
  }).join('');
}

    <div class="section" style="padding-top:0">
      <div class="section-head"><h3>Payment method</h3></div>
      <div class="opt-row" style="flex-direction:column; gap:10px;">
        <label class="opt ${state.payMethod!=='card'?'sel':''}" style="display:flex; align-items:center; gap:10px; width:100%; cursor:pointer;">
          <input type="radio" name="pay" checked onchange="state.payMethod='cod'"> Cash on delivery
        </label>
        <label class="opt" style="display:flex; align-items:center; gap:10px; width:100%; cursor:pointer;">
          <input type="radio" name="pay" onchange="state.payMethod='card'"> Card / UPI (demo)
        </label>
      </div>
    </div>
    <div class="summary">
      <div class="srow"><span>Subtotal</span><span>${money(subtotal)}</span></div>
      <div class="srow"><span>Shipping</span><span>${shipping===0?'Free':money(shipping)}</span></div>
      <div class="srow total"><span>Total</span><span>${money(total)}</span></div>
    </div>
    <div style="height:110px"></div>
    <div class="checkout-bar">
      <button class="btn btn-primary" onclick="placeOrder()">Place order · ${money(total)}</button>
    </div>
  `;
}
function placeOrder(){
  const name = document.getElementById('ck-name').value.trim();
  const phone = document.getElementById('ck-phone').value.trim();
  const address = document.getElementById('ck-address').value.trim();
  if(!name || !phone || !address){ toast('Please fill in your delivery details'); return; }
  const order = {
    id: 'HB' + Math.floor(10000+Math.random()*89999),
    items: JSON.parse(JSON.stringify(state.cart)),
    total: cartSubtotal() + (cartSubtotal()>1999?0:79),
    date: new Date().toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'}),
    status:'Processing',
  };
  state.orders.unshift(order);
  state.cart = [];
  syncUserData();
  go('orderSuccess');
}

function screenOrderSuccess(){
  const order = state.orders[0];
  return `
    <div class="center-logo" style="padding:40px 30px;">
      <div style="width:84px;height:84px;border-radius:50%;background:#E6F8EF;display:flex;align-items:center;justify-content:center;font-size:40px;">✅</div>
      <h2 style="margin-top:10px;">Order placed!</h2>
      <p style="color:var(--text-muted); font-size:13.5px; text-align:center; line-height:1.6;">Your order <b>#${order?order.id:''}</b> has been placed successfully. You'll receive it in 3–5 business days.</p>
      <div style="width:100%; margin-top:20px; display:flex; flex-direction:column; gap:10px;">
        <button class="btn btn-primary" onclick="state.history=[]; go('orders', false)">Track order</button>
        <button class="btn btn-outline" onclick="state.history=[]; go('home', false)">Continue shopping</button>
      </div>
    </div>
  `;
}

function screenOrders(){
  return `
    <div class="topbar">
      <div class="iconbtn" onclick="go('profile')">${icon('back')}</div>
      <h1 class="grow">My orders</h1>
    </div>
    ${state.orders.length ? state.orders.map(o=>`
      <div class="order-card">
        <div class="top">
          <div><b style="font-size:13.5px;">#${o.id}</b><div style="font-size:11.5px;color:var(--text-muted);margin-top:2px;">${o.date} · ${o.items.length} item(s)</div></div>
          <span class="status-pill">${o.status}</span>
        </div>
        <div style="display:flex; gap:-8px; margin:8px 0;">
          ${o.items.slice(0,4).map(it=>`<img src="${img(getProduct(it.productId).seed,80,80)}" style="width:38px;height:38px;border-radius:8px;object-fit:cover;margin-right:-8px;border:2px solid var(--surface);">`).join('')}
        </div>
        <div style="font-weight:800; font-size:14px;">${money(o.total)}</div>
      </div>
    `).join('') : emptyState('📦','No orders yet','Your placed orders will show up here.')}
  `;
}

function emptyState(emoji,title,text){
  return `<div class="empty"><div class="emoji">${emoji}</div><h3>${title}</h3><p>${text}</p>
    <button class="btn btn-primary" style="width:auto; padding:13px 26px;" onclick="state.history=[]; go('home',false)">Start shopping</button>
  </div>`;
}

/* ---- Profile / Auth (no OTP — simple email+password or guest) ---- */
function screenProfile(){
  if(!state.user){
    return `
      <div class="topbar"><h1 class="grow">Profile</h1></div>
      <div class="center-logo" style="height:auto; padding:50px 30px 20px;">
        <div class="logo-mark">H</div>
        <h2 style="margin-top:14px;">Welcome to Hobby</h2>
        <p style="color:var(--text-muted); font-size:13px; text-align:center; margin-top:4px;">Sign in to track orders and save your details.</p>
        <div style="width:100%; margin-top:22px; display:flex; flex-direction:column; gap:10px;">
          <button class="btn btn-primary" onclick="state.authMode='login'; go('login')">Log in</button>
          <button class="btn btn-outline" onclick="state.authMode='signup'; go('signup')">Create account</button>
          <button class="btn btn-ghost" onclick="continueAsGuest()">Continue as guest</button>
        </div>
      </div>
    `;
  }
  return `
    <div class="topbar"><h1 class="grow">Profile</h1></div>
    <div class="profile-head">
      <div class="avatar">${state.user.name.charAt(0).toUpperCase()}</div>
      <div><div style="font-weight:700; font-size:16px;">${state.user.name}</div><div style="font-size:12.5px; opacity:.85;">${state.user.email}</div></div>
    </div>
    <div class="menu-row" onclick="go('orders')">${icon('box')}<span>My orders</span>${icon('chev')}</div>
    <div class="menu-row" onclick="go('wishlist', false)">${icon('heartsm')}<span>Wishlist</span>${icon('chev')}</div>
    <div class="menu-row" onclick="toast('Address book — demo only')">${icon('address')}<span>Saved addresses</span>${icon('chev')}</div>
    <div class="menu-row" onclick="toast('Settings — demo only')">${icon('settings')}<span>Settings</span>${icon('chev')}</div>
    <div class="menu-row" onclick="logout()" style="border-bottom:none;">${icon('logout')}<span style="color:var(--accent)">Log out</span></div>
  `;
}
function continueAsGuest(){
  state.user = {name:'Guest', email:'guest@hobby.app'}; // local only, not synced to Firestore
  state.history=[]; go('home', false);
  toast('Browsing as guest');
}
function logout(){
  if(firebaseReady && auth.currentUser){ auth.signOut(); }
  state.user = null;
  state.cart = []; state.wishlist = []; state.orders = [];
  state.history=[]; go('home', false);
}

function screenLogin(){
  return `
    <div class="topbar"><div class="iconbtn" onclick="back()">${icon('back')}</div></div>
    <div style="padding:10px 26px 30px;">
      <h2 style="font-size:24px;">Log in</h2>
      <p style="color:var(--text-muted); font-size:13px; margin-top:4px;">No OTP needed — just your email and password.</p>
      <div style="margin-top:24px;">
        <div class="field"><label>Email</label><input id="lg-email" type="email" placeholder="you@example.com"></div>
        <div class="field"><label>Password</label><input id="lg-pass" type="password" placeholder="••••••••"></div>
      </div>
      <button class="btn btn-primary" onclick="doLogin()">Log in</button>
      <p class="hint">Don't have an account? <a class="linklike" onclick="go('signup')">Sign up</a></p>
    </div>
  `;
}
function screenSignup(){
  return `
    <div class="topbar"><div class="iconbtn" onclick="back()">${icon('back')}</div></div>
    <div style="padding:10px 26px 30px;">
      <h2 style="font-size:24px;">Create account</h2>
      <p style="color:var(--text-muted); font-size:13px; margin-top:4px;">Just the basics — no OTP verification required.</p>
      <div style="margin-top:24px;">
        <div class="field"><label>Full name</label><input id="su-name" placeholder="Your name"></div>
        <div class="field"><label>Email</label><input id="su-email" type="email" placeholder="you@example.com"></div>
        <div class="field"><label>Password</label><input id="su-pass" type="password" placeholder="Create a password"></div>
      </div>
      <button class="btn btn-primary" onclick="doSignup()">Create account</button>
      <p class="hint">Already have an account? <a class="linklike" onclick="go('login')">Log in</a></p>
    </div>
  `;
}
function doLogin(){
  const email = document.getElementById('lg-email').value.trim();
  const pass = document.getElementById('lg-pass').value;
  if(!email || !pass){ toast('Enter your email and password'); return; }
  if(!firebaseReady){
    // Demo fallback if firebaseConfig hasn't been filled in yet
    state.user = {name: email.split('@')[0].replace(/[._]/g,' '), email};
    state.history=[]; go('profile', false);
    toast('Welcome back! (demo mode — Firebase not connected)');
    return;
  }
  auth.signInWithEmailAndPassword(email, pass)
    .then(()=>{ state.history=[]; go('profile', false); toast('Welcome back!'); })
    .catch(err=> toast(friendlyAuthError(err)));
}
function doSignup(){
  const name = document.getElementById('su-name').value.trim();
  const email = document.getElementById('su-email').value.trim();
  const pass = document.getElementById('su-pass').value;
  if(!name || !email || !pass){ toast('Please fill in all fields'); return; }
  if(pass.length < 6){ toast('Password must be at least 6 characters'); return; }
  if(!firebaseReady){
    state.user = {name, email};
    state.history=[]; go('profile', false);
    toast('Account created! (demo mode — Firebase not connected)');
    return;
  }
  auth.createUserWithEmailAndPassword(email, pass)
    .then(cred => cred.user.updateProfile({displayName: name}).then(()=>{
      return db.collection('users').doc(cred.user.uid).set({
        name, email, cart:[], wishlist:[], orders:[]
      }, {merge:true});
    }))
    .then(()=>{ state.history=[]; go('profile', false); toast('Account created!'); })
    .catch(err=> toast(friendlyAuthError(err)));
}
function friendlyAuthError(err){
  const map = {
    'auth/email-already-in-use':'That email is already registered — try logging in.',
    'auth/invalid-email':'That email address looks invalid.',
    'auth/weak-password':'Password should be at least 6 characters.',
    'auth/user-not-found':'No account found with that email.',
    'auth/wrong-password':'Incorrect password.',
    'auth/invalid-credential':'Incorrect email or password.',
  };
  return map[err.code] || (err.message || 'Something went wrong, please try again.');
}

/* ---- Keep app state in sync with Firebase Auth session ---- */
function initFirebaseAuthListener(){
  if(!firebaseReady) return;
  auth.onAuthStateChanged(fbUser=>{
    if(fbUser){
      db.collection('users').doc(fbUser.uid).get().then(snap=>{
        const data = snap.exists ? snap.data() : {};
        state.user = {name: fbUser.displayName || data.name || fbUser.email.split('@')[0], email: fbUser.email, uid: fbUser.uid};
        state.cart = data.cart || [];
        state.wishlist = data.wishlist || [];
        state.orders = data.orders || [];
        render();
      });
    }
  });
}

/* ---- Firestore-backed product catalog (falls back to the built-in list above if Firebase isn't connected) ---- */
function initFirestoreProducts(){
  if(!firebaseReady) return;
  const col = db.collection('products');
  col.get().then(snap=>{
    if(snap.empty){
      // First run: seed Firestore with the built-in catalog so it can be edited from the Firebase console
      const batch = db.batch();
      PRODUCTS.forEach(p=> batch.set(col.doc(String(p.id)), p));
      batch.commit().catch(err=>console.warn('Seeding products failed:', err));
    } else {
      PRODUCTS = snap.docs.map(d=>d.data());
      render();
    }
  }).catch(err=>console.warn('Loading products failed:', err));
}

/* ============================ MASTER RENDER ============================ */
function render(){
  const screens = {
    home: screenHome,
    categories: screenCategories,
    search: screenSearch,
    productDetail: screenProductDetail,
    wishlist: screenWishlist,
    cart: screenCart,
    checkout: screenCheckout,
    orderSuccess: screenOrderSuccess,
    orders: screenOrders,
    profile: screenProfile,
    login: screenLogin,
    signup: screenSignup,
  };
  document.getElementById('screen').innerHTML = (screens[state.screen] || screenHome)();
  renderBottomNav();
}

/* clock */
function updateClock(){
  const d = new Date();
  let h = d.getHours()%12; if(h===0) h=12;
  const m = d.getMinutes().toString().padStart(2,'0');
  document.getElementById('clock').textContent = `${h}:${m}`;
}
updateClock(); setInterval(updateClock, 30000);

render();
initFirebaseAuthListener();
initFirestoreProducts();
</script>
</body>
</html>
